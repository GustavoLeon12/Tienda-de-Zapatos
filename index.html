<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zapatería Ejemplo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Zapatería Ejemplo</a>
    </div>
  </nav>
 <!-- Carrusel -->
<div id="mainCarousel" class="carousel slide carousel-custom" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="image/carrusel1.jpg" class="d-block w-100 carousel-img" alt="Oferta 1" style="height: 550px;">
        <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-3">
          <h5>Bienvenidos a nuestra tienda virtual</h5>
          <p>Tenemos ofertas de hasta 50% de descuento en zapatos seleccionados</p>
        </div>
      </div>
      <div class="carousel-item">
        <img src="image/carrusel2.jpg" class="d-block w-100 carousel-img" alt="Oferta 2" style="height: 550px;">
        <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-3">
          <h5>Nuevas Colecciones 2025</h5>
          <p>Estilo, comodidad y precio en un solo lugar</p>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

<!-- Productos -->
<section class="container my-5">
    <h2 class="text-center mb-4">Nuestros Productos</h2>
    <div class="row" id="product-list">
      <!-- JS llenará los productos aquí -->
    </div>
  
    <!-- Botón Ver Más -->
    <div class="text-center mt-4">
      <a href="catalogo.html" class="btn btn-outline-primary btn-lg">Ver más</a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3">
    © 2025 Zapatería Ejemplo. Todos los derechos reservados.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
